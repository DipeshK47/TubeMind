[project]
name = "hnswlib"
version = "0.8.0"
description = "Resolver shim for Windows environments that load hnswlib from chroma-hnswlib."
requires-python = ">=3.12"
dependencies = [
    "chroma-hnswlib==0.7.6a4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["README.md"]
